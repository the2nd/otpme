# Extraction rules for `pybabel extract -F babel.cfg ...`
# Run from inside otpme/web/app/.
#
# Workflow (from the repo root):
#   cd otpme/web/app
#   pybabel extract -F babel.cfg --no-default-keywords \
#                   -k gettext -k ngettext:1,2 -k lazy_gettext \
#                   -o translations/messages.pot .
#
# `--no-default-keywords` is REQUIRED: pybabel's default keyword list
# includes `_`, which would scoop up OTPme's builtin `_()` calls (they
# belong to the `otpme` gettext domain extracted via a separate
# toolchain, not into the Flask-Babel `messages` catalog).
#   pybabel init   -i translations/messages.pot -d translations -l de   # one-off, per new locale
#   pybabel update -i translations/messages.pot -d translations         # after every extract
#   # ... edit translations/<lc>/LC_MESSAGES/messages.po ...
#   pybabel compile -d translations
#
# Add a new locale: append it to SUPPORTED_LOCALES in __init__.py *and*
# `pybabel init -l <code>`.
#
# WHY NOT `-k _`?  OTPme already binds the Python builtin `_(msg, log=False)`
# to its own gettext (otpme/lib/otpme_config.py). Calling that via
# Flask-Babel would break the (text, log_text) tuple return path.
# In Python web code use `from flask_babel import gettext, lazy_gettext`
# explicitly; in Jinja templates the bare `_("...")` is the Jinja-side
# alias Flask-Babel installs, which is independent of the Python builtin.

[python: **.py]
[jinja2: templates/**.html]
